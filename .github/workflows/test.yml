name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Test Suite (Source)
      run: ./webrun --self-test

    - name: Run Test Suite (Bundled)
      run: |
        ./webrun --self-bundle > webrun_bundled
        chmod +x webrun_bundled
        ./webrun_bundled --self-test
